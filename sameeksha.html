<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micrometeorite Impact Detection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(31, 40, 51, 0.7);
            --cyan: #66fcf1;
            --cyan-dark: #45a29e;
            --green: #00ff87;
            --yellow: #ffcc00;
            --red: #ff003c;
            --text-main: #c5c6c7;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Space Particle Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(180deg, rgba(11,12,16,1) 0%, rgba(11,12,16,0) 100%);
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
            margin-bottom: 10px;
        }

        .timestamp {
            font-size: 1.2rem;
            color: var(--cyan-dark);
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 30px;
            width: 95%;
            max-width: 1400px;
            margin: 20px auto;
            z-index: 10;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.3);
            border-color: var(--cyan);
        }

        .card i {
            font-size: 3rem;
            color: var(--cyan);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--cyan));
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--white);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .unit {
            font-size: 1.5rem;
            color: var(--cyan-dark);
        }

        /* Central Impact Display */
        .central-card {
            border: 2px solid var(--cyan);
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.2);
            position: relative;
        }

        .central-card i {
            font-size: 4rem;
        }

        .central-card .value {
            font-size: 4.5rem;
        }

        /* Progress Bar / Gauge */
        .gauge-container {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gauge-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.5s ease, box-shadow 0.5s ease;
        }

        .level-text {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }

        /* Chart Container */
        .chart-row {
            grid-column: span 3;
            height: 350px;
            padding: 20px;
        }

        canvas#impactChart {
            width: 100% !important;
            height: 100% !important;
        }

        /* Dynamic Colors & Animations */
        .color-green { color: var(--green); text-shadow: 0 0 15px var(--green); }
        .color-yellow { color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }
        .color-red { color: var(--red); text-shadow: 0 0 15px var(--red); }

        .bg-green { background-color: var(--green); box-shadow: 0 0 20px var(--green); }
        .bg-yellow { background-color: var(--yellow); box-shadow: 0 0 20px var(--yellow); }
        .bg-red { background-color: var(--red); box-shadow: 0 0 20px var(--red); }

        @keyframes pulseAlert {
            0% { box-shadow: 0 0 20px rgba(255, 0, 60, 0.4); border-color: rgba(255, 0, 60, 0.5); }
            50% { box-shadow: 0 0 50px rgba(255, 0, 60, 0.9); border-color: rgba(255, 0, 60, 1); }
            100% { box-shadow: 0 0 20px rgba(255, 0, 60, 0.4); border-color: rgba(255, 0, 60, 0.5); }
        }

        .alert-state {
            animation: pulseAlert 1s infinite;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            .chart-row {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <h1>Micrometeorite Impact Dashboard</h1>
        <div class="timestamp">Last Update: <span id="time-display">--:--:--</span></div>
    </header>

    <div class="dashboard-container">
        
        <div class="card">
            <i class="fa-solid fa-bolt"></i>
            <h2>Photodiode Signal</h2>
            <div class="value"><span id="val-light">0.00</span><span class="unit"> V</span></div>
        </div>

        <div class="card central-card" id="impact-card">
            <i class="fa-solid fa-meteor" id="impact-icon"></i>
            <h2>Impact Force</h2>
            <div class="value"><span id="val-impact">0.0</span><span class="unit"> N</span></div>
            
            <div class="gauge-container">
                <div class="gauge-fill" id="gauge-bar"></div>
            </div>
            
            <div class="level-text" id="val-level-text">Level: 0 / 10</div>
        </div>

        <div class="card">
            <i class="fa-solid fa-temperature-half"></i>
            <h2>Temperature</h2>
            <div class="value"><span id="val-temp">0.0</span><span class="unit"> °C</span></div>
        </div>

        <div class="card chart-row">
            <canvas id="impactChart"></canvas>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CHANNEL_ID = 3311516;
        const REFRESH_RATE = 2500; // 2.5 seconds
        
        // SET TO 'false' WHEN READY TO USE REAL THINGSPEAK API
        const SIMULATION_MODE = true; 

        // ==========================================
        // UI ELEMENTS
        // ==========================================
        const elImpact = document.getElementById('val-impact');
        const elLight = document.getElementById('val-light');
        const elTemp = document.getElementById('val-temp');
        const elTime = document.getElementById('time-display');
        const elGauge = document.getElementById('gauge-bar');
        const elLevelText = document.getElementById('val-level-text');
        const elImpactCard = document.getElementById('impact-card');
        const elImpactIcon = document.getElementById('impact-icon');

        // ==========================================
        // CHART.JS SETUP
        // ==========================================
        const ctx = document.getElementById('impactChart').getContext('2d');
        const impactChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Impact Force (N)',
                    data: [],
                    borderColor: '#66fcf1',
                    backgroundColor: 'rgba(102, 252, 241, 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#66fcf1',
                    pointRadius: 3,
                    fill: true,
                    tension: 0.4 // Smooth curves
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#45a29e' }
                    },
                    y: {
                        beginAtZero: true,
                        max: 100, // Assuming 100N is max impact
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#45a29e' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#c5c6c7', font: { family: 'Rajdhani', size: 14 } } }
                },
                animation: { duration: 400 }
            }
        });

        // ==========================================
        // DATA FETCHING & UI UPDATE LOGIC
        // ==========================================
        async function fetchSensorData() {
            let impactN = 0, lightV = 0, tempC = 0;

            if (SIMULATION_MODE) {
                // Generate realistic mock data for demo purposes
                const isImpact = Math.random() > 0.85; // 15% chance of a strike
                impactN = isImpact ? (Math.random() * 80 + 10) : (Math.random() * 5); // Spikes up to 90N
                lightV = isImpact ? (Math.random() * 3 + 2) : (Math.random() * 0.5); // Flash on impact
                tempC = 20 + (Math.random() * 5); // Fluctuates between 20-25
            } else {
                try {
                    const response = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=1`);
                    const data = await response.json();
                    const feed = data.feeds[0];
                    
                    impactN = parseFloat(feed.field1) || 0;
                    lightV = parseFloat(feed.field2) || 0;
                    tempC = parseFloat(feed.field3) || 0;
                } catch (error) {
                    console.error("Error fetching data:", error);
                    return; // Skip update on network failure
                }
            }

            updateDashboard(impactN, lightV, tempC);
        }

        function updateDashboard(impact, light, temp) {
            // Update Text Values
            elImpact.innerText = impact.toFixed(1);
            elLight.innerText = light.toFixed(2);
            elTemp.innerText = temp.toFixed(1);
            
            // Update Timestamp
            const now = new Date();
            elTime.innerText = now.toLocaleTimeString();

            // Calculate Impact Level (0 to 10 scale, assuming 100N is max)
            let level = (impact / 100) * 10;
            if (level > 10) level = 10;
            
            elLevelText.innerText = `Level: ${level.toFixed(1)} / 10`;
            elGauge.style.width = `${(level / 10) * 100}%`;

            // Reset visual states
            elImpactIcon.className = "fa-solid fa-meteor";
            elImpactCard.classList.remove('alert-state');
            elGauge.className = "gauge-fill";
            elLevelText.className = "level-text";

            // Color Coding & Alerts based on Level
            if (level < 3) {
                // Low - Green
                elGauge.classList.add('bg-green');
                elLevelText.classList.add('color-green');
                elImpactIcon.classList.add('color-green');
            } else if (level < 7) {
                // Medium - Yellow
                elGauge.classList.add('bg-yellow');
                elLevelText.classList.add('color-yellow');
                elImpactIcon.classList.add('color-yellow');
            } else {
                // High - Red + Pulse Animation
                elGauge.classList.add('bg-red');
                elLevelText.classList.add('color-red');
                elImpactIcon.classList.add('color-red');
                elImpactCard.classList.add('alert-state');
            }

            // Update Chart
            const timeLabel = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();
            impactChart.data.labels.push(timeLabel);
            impactChart.data.datasets[0].data.push(impact);

            // Keep only the last 20 data points on the chart
            if (impactChart.data.labels.length > 20) {
                impactChart.data.labels.shift();
                impactChart.data.datasets[0].data.shift();
            }
            impactChart.update();
        }

        // ==========================================
        // SPACE PARTICLE BACKGROUND SYSTEM
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctxSpace = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctxSpace.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctxSpace.beginPath();
                ctxSpace.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxSpace.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctxSpace.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        initParticles();
        animateParticles();
        fetchSensorData(); // Initial call
        setInterval(fetchSensorData, REFRESH_RATE); // Auto-refresh loop

    </script>
</body>
</html>
